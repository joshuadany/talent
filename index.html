function createMockSb() {
  const delay = (ms) => new Promise(r => setTimeout(r, ms));
  const chain = (table, action, payload) => {
    const query = { table, action, payload, filters: [] };
    const execute = async () => {
      await delay(50); // 네트워크 딜레이 흉내
      let data = [...(MOCK_DB[table] || [])];
      
      if (query.action === 'select') {
        for(const f of query.filters) {
          if(f.type === 'eq') data = data.filter(d => d[f.field] === f.value);
          if(f.type === 'is') data = data.filter(d => d[f.field] === f.value);
        }
        if(query.order) {
          data.sort((a,b) => {
            const va = a[query.order.field] || "";
            const vb = b[query.order.field] || "";
            if(va < vb) return query.order.ascending ? -1 : 1;
            if(va > vb) return query.order.ascending ? 1 : -1;
            return 0;
          });
        }
        if(query.single) return { data: data.length > 0 ? data[0] : null, error: null };
        return { data, error: null };
      }
      else if (query.action === 'insert') {
        const newItem = { id: "id_"+Math.random().toString(36).substr(2,9), created_at: new Date().toISOString(), ...query.payload };
        MOCK_DB[table].push(newItem);
        return { error: null };
      }
      else if (query.action === 'update') {
        MOCK_DB[table] = MOCK_DB[table].map(item => {
          let match = true;
          for(const f of query.filters) {
            if (f.type === 'eq' && item[f.field] !== f.value) match = false;
            if (f.type === 'is' && item[f.field] !== f.value) match = false;
          }
          if (match) return { ...item, ...query.payload };
          return item;
        });
        return { error: null };
      }
      else if (query.action === 'delete') {
         MOCK_DB[table] = MOCK_DB[table].filter(item => {
          let match = true;
          for(const f of query.filters) {
            if (f.type === 'eq' && item[f.field] !== f.value) match = false;
            if (f.type === 'is' && item[f.field] !== f.value) match = false;
          }
          return !match;
        });
        return { error: null };
      }
    };

    const builder = {
      eq: (field, value) => { query.filters.push({type:'eq', field, value}); return builder; },
      is: (field, value) => { query.filters.push({type:'is', field, value}); return builder; },
      order: (field, opts) => { query.order = {field, ascending: opts?.ascending !== false}; return builder; },
      maybeSingle: () => { query.single = true; return builder; },
      select: () => { query.action = 'select'; return builder; },
      then: (resolve, reject) => { execute().then(resolve).catch(reject); }
    };
    return builder;
  };

  return {
    from: (table) => ({
      select: () => chain(table, 'select'),
      insert: (data) => chain(table, 'insert', data),
      update: (data) => chain(table, 'update', data),
      delete: () => chain(table, 'delete')
    }),
    channel: () => ({ on: () => ({ on: () => ({ on: () => ({ on: () => ({ on: () => ({ subscribe: () => {} }) }) }) }) }), subscribe: () => {} }),
    removeChannel: () => {},
    storage: {
      from: () => ({
        upload: async () => ({ error: null }),
        getPublicUrl: (path) => ({ data: { publicUrl: `https://placehold.co/400x300/3D1A2E/E8EDF5?text=Uploaded+Photo` } })
      })
    }
  };
}

const today=()=>{

  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};

function weekStartOf(dateStr){
  const s=(dateStr||today()).slice(0,10);
  const [y,mo,d]=s.split("-").map(Number);
  const local=new Date(y, mo-1, d);
  local.setDate(local.getDate()-local.getDay());
  return `${local.getFullYear()}-${String(local.getMonth()+1).padStart(2,"0")}-${String(local.getDate()).padStart(2,"0")}`;
}
function formatWeekRange(weekStart){
  const [y,mo,d]=weekStart.split("-").map(Number);
  const s=new Date(y, mo-1, d);
  const e=new Date(y, mo-1, d+6);
  const sM=s.getMonth()+1, sD=s.getDate();
  const eM=e.getMonth()+1, eD=e.getDate();
  if(sM===eM) return `${sM}월 ${sD}일 ~ ${eD}일 (일 ~ 토)`;
  return `${sM}월 ${sD}일 ~ ${eM}월 ${eD}일 (일 ~ 토)`;
}
function recentWeeks(count=12){
  const arr=[];
  let cur=weekStartOf(today());
  for(let i=0;i<count;i++){
    arr.push(cur);
    const [y,mo,d]=cur.split("-").map(Number);
    const local=new Date(y, mo-1, d-7);
    cur=`${local.getFullYear()}-${String(local.getMonth()+1).padStart(2,"0")}-${String(local.getDate()).padStart(2,"0")}`;
  }
  return arr;
}

function compressImage(file,maxW=900,q=0.7){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=(e)=>{const img=new Image();img.onload=()=>{const sc=Math.min(1,maxW/img.width);const c=document.createElement("canvas");c.width=img.width*sc;c.height=img.height*sc;c.getContext("2d").drawImage(img,0,0,c.width,c.height);c.toBlob(b=>res(b),"image/jpeg",q);};img.onerror=rej;img.src=e.target.result;};
    r.onerror=rej;r.readAsDataURL(file);
  });
}
async function uploadPhoto(file){
  if(!sb||!file) return null;
  const blob=await compressImage(file);
  const path=`proof_${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
  const { error }=await sb.storage.from(STORAGE_BUCKET).upload(path,blob,{contentType:"image/jpeg"});
  if(error){ alert("사진 업로드 실패: "+error.message); return null; }
  return sb.storage.from(STORAGE_BUCKET).getPublicUrl(path).data.publicUrl;
}

    showToast("다짐 수정 완료 ✓"); reload();
  };
  const deleteResolution=async(id)=>{
    const { error }=await sb.from("resolutions").delete().eq("id",id);
    if(error){ showToast("삭제 실패: "+error.message,"error"); return; }
    showToast("다짐이 삭제되었습니다","error"); reload();
  };
  const sendMessage=async(studentId, senderId, content)=>{
    const { error }=await sb.from("messages").insert({ student_id:studentId, sender_id:senderId, content });
    if(error){ showToast("전송 실패: "+error.message,"error"); return; }
    showToast("응원 메시지가 전달되었습니다 💌"); reload();
  };
  const markMessagesRead=async(studentId)=>{
    const nowISO=new Date().toISOString();
    await sb.from("messages").update({ read_at:nowISO }).eq("student_id",studentId).is("read_at",null);
    reload();
  };

  const addStudent=async(data)=>{
    const { error }=await sb.from("members").insert({ login_id:data.login_id,name:data.name,role:"student",password:data.password,klass:data.klass,grade:data.grade,grp:data.grp });
    if(error){ showToast("등록 실패: "+error.message,"error"); return; }
    showToast("학생 등록 완료 · 기본 50달란트 지급 ✓"); reload();
  };
  const addTeacher=async(data)=>{
    const { error }=await sb.from("members").insert({ login_id:data.login_id,name:data.name,role:"teacher",password:data.password,is_head:data.is_head,klass:data.klass||null,grp:"중고등부" });
    if(error){ showToast("등록 실패: "+error.message,"error"); return; }
    showToast("교사 등록 완료 ✓"); reload();
  };
  const addParent=async(data)=>{
    const { error }=await sb.from("members").insert({ login_id:data.login_id,name:data.name,role:"parent",password:data.password,child_id:data.child_id||null });
    if(error){ showToast("등록 실패: "+error.message,"error"); return; }
    showToast("학부모 등록 완료 ✓"); reload();
  };
  const updateMember=async(id, data)=>{
    const { error }=await sb.from("members").update(data).eq("id",id);
    if(error){ showToast("수정 실패: "+error.message,"error"); return; }
    showToast("정보 수정 완료 ✓"); reload();
  };
  const removeMember=async(id)=>{
    const { error }=await sb.from("members").delete().eq("id",id);
    if(error){ showToast("삭제 실패: "+error.message,"error"); return; }
    showToast("계정이 삭제되었습니다","error"); reload();
  };

  const changePassword = async (oldPw, newPw) => {
    if (currentUser.password !== oldPw) {
      return { error: "현재 비밀번호가 일치하지 않습니다." };
    }
    const { error } = await sb.from("members").update({ password: newPw }).eq("id", currentUser.id);
    if (error) return { error: error.message };
    
    setCurrentUser(prev => ({...prev, password: newPw}));
    showToast("비밀번호가 안전하게 변경되었습니다 ✓");
    reload();
    return { success: true };
  };

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.textMid}}>불러오는 중...</div>;

  const students=members.filter(u=>u.role==="student");

  return (
    <div style={{minHeight:"100vh"}}>
      {!configured && (
        <div style={{background:C.amberBg,color:C.amber,textAlign:"center",padding:"8px 10px",fontSize:12,fontWeight:700,borderBottom:`1px solid ${C.amber}`}}>
          ⚠️ 제미나이 시뮬레이션 (데모) 모드로 실행 중입니다.<br/>데이터는 브라우저를 새로고침하면 초기화됩니다.
        </div>
      )}
      {toast && <div style={{position:"fixed",top:!configured?54:20,left:"50%",transform:"translateX(-50%)",background:toast.type==="success"?C.green:C.red,color:"#fff",padding:"10px 24px",borderRadius:8,zIndex:9999,fontWeight:600,fontSize:14,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",maxWidth:"90%",textAlign:"center"}}>{toast.msg}</div>}
      {photoModal && <div onClick={()=>setPhotoModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:20,cursor:"pointer"}}><img src={photoModal} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:12,border:`2px solid ${C.gold}`}}/></div>}
      {showPwModal && <ChangePasswordModal onChangePassword={changePassword} onClose={()=>setShowPwModal(false)} />}

      {!currentUser && <LoginView members={members} login={login}/>}
      {currentUser?.role==="teacher" && (
        <TeacherDashboard teacher={currentUser} allStudents={students} transactions={transactions} reflections={reflections} resolutions={resolutions} messages={messages} allUsers={members}
          onApprove={(id)=>{updateTransaction(id,{status:"approved",approved_by:currentUser.id});showToast("승인되었습니다 ✓");}}
          onReject={(id)=>{updateTransaction(id,{status:"rejected"});showToast("반려되었습니다","error");}}
          onDirectRecord={addTransaction} onAddStudent={addStudent}
          onSendMessage={(sid,c)=>sendMessage(sid, currentUser.id, c)}
          allMembers={members} onAddTeacher={addTeacher} onAddParent={addParent} onRemoveMember={removeMember} onUpdateMember={updateMember}
          logout={logout} onPhotoClick={setPhotoModal} onOpenPwModal={()=>setShowPwModal(true)}/>
      )}
      {currentUser?.role==="parent" && (
        <ParentDashboard parent={currentUser} child={members.find(u=>u.id===currentUser.child_id)}
          transactions={transactions.filter(t=>t.student_id===currentUser.child_id)}
          messages={messages.filter(m=>m.student_id===currentUser.child_id)}
          onApprove={(id)=>{updateTransaction(id,{status:"approved",approved_by:currentUser.id});showToast("승인되었습니다 ✓");}}
          onReject={(id)=>{updateTransaction(id,{status:"rejected"});showToast("반려되었습니다","error");}}
          onSendMessage={(c)=>sendMessage(currentUser.child_id, currentUser.id, c)}
          logout={logout} onPhotoClick={setPhotoModal} onOpenPwModal={()=>setShowPwModal(true)}/>
      )}
      {currentUser?.role==="student" && (
        <StudentBook currentUser={currentUser} student={currentUser} allStudents={students} allTransactions={transactions} allUsers={members}
          transactions={transactions.filter(t=>t.student_id===currentUser.id)}
          reflections={reflections.filter(r=>r.student_id===currentUser.id)}
          resolutions={resolutions.filter(r=>r.student_id===currentUser.id)}
          messages={messages.filter(m=>m.student_id===currentUser.id)}
          onApply={addTransaction}
          onSaveReflection={(ws,c)=>upsertReflection(currentUser.id, ws, c)}
          onAddResolution={(t,c)=>addResolution(currentUser.id, t, c)}
          onUpdateResolution={updateResolution}
          onDeleteResolution={deleteResolution}
          onMarkRead={()=>markMessagesRead(currentUser.id)}
          logout={logout} onPhotoClick={setPhotoModal} onOpenPwModal={()=>setShowPwModal(true)}/>
      )}
    </div>
  );
}

function ChangePasswordModal({ onClose, onChangePassword }) {
  const [oldPw, setOldPw] = useState("");
  const [newPw, setNewPw] = useState("");
  const [error, setError] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    if(!oldPw || !newPw) return;
    setBusy(true);
    const res = await onChangePassword(oldPw, newPw);
    if(res.error) {
       setError(res.error);
       setBusy(false);
    } else {
       onClose();
    }
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:10000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
       <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:20,width:"100%",maxWidth:360}}>
          <div style={{fontWeight:800,fontSize:16,color:C.gold,marginBottom:16}}>내 정보 (비밀번호 변경)</div>
          <label style={labelStyle}>현재 비밀번호</label>
          <input type="password" value={oldPw} onChange={e=>setOldPw(e.target.value)} placeholder="현재 비밀번호 입력" style={{...inputStyle,marginBottom:12}}/>
          <label style={labelStyle}>새 비밀번호</label>
          <input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="새로운 비밀번호 입력" style={{...inputStyle,marginBottom:16}}/>
          {error && <div style={{color:C.red,fontSize:12,marginBottom:12,textAlign:"center"}}>{error}</div>}
          <div style={{display:"flex",gap:8}}>
             <button onClick={submit} disabled={busy||!oldPw||!newPw} style={{flex:1,padding:"10px 0",background:`linear-gradient(135deg, ${C.gold}, ${C.goldL})`,color:"#1A1200",fontWeight:800,borderRadius:8,border:"none",cursor:(!busy&&oldPw&&newPw)?"pointer":"not-allowed"}}>변경하기</button>
             <button onClick={onClose} style={{flex:1,padding:"10px 0",background:C.surface,color:C.textMid,border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer"}}>취소</button>
          </div>
       </div>
    </div>
  )
}

function PhotoInput({ file, setFile, preview, setPreview }){
  const [loading,setLoading]=useState(false);
  const handle=(e)=>{const f=e.target.files?.[0];if(!f)return;setLoading(true);setFile(f);const r=new FileReader();r.onload=(ev)=>{setPreview(ev.target.result);setLoading(false);};r.readAsDataURL(f);};
  return (
    <div style={{marginBottom:14}}>
      <label style={labelStyle}>📷 증빙 사진 (스마트폰 촬영 / 갤러리)</label>
      {preview ? (
        <div style={{position:"relative",display:"inline-block"}}>
          <img src={preview} style={{width:"100%",maxWidth:220,borderRadius:10,border:`1px solid ${C.border}`}}/>
          <button onClick={()=>{setFile(null);setPreview(null);}} style={{position:"absolute",top:6,right:6,background:C.red,color:"#fff",border:"none",borderRadius:"50%",width:26,height:26,cursor:"pointer",fontWeight:800,fontSize:14}}>×</button>
        </div>
      ) : (
        <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,padding:"20px 0",background:C.surface,border:`1px dashed ${C.border}`,borderRadius:10,cursor:"pointer",color:C.textMid,fontSize:13}}>
          {loading?"사진 처리 중...":"📸 사진 촬영 / 선택하기"}
          <input type="file" accept="image/*" capture="environment" onChange={handle} style={{display:"none"}}/>
        </label>
      )}
    </div>
  );
}

function BankCard({ student, balance }){
  const tier=getTier(balance),next=getNextTier(balance);
  const prevMin=tier?tier.min:0,nextMin=next?next.min:1000;
  const seg=next?Math.min(((balance-prevMin)/(nextMin-prevMin))*100,100):100;
  return (
    <div style={{background:"linear-gradient(135deg,#1A2F4F,#0F1D35)",border:`1px solid ${C.goldDim}`,borderRadius:16,padding:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <div style={{fontSize:12,color:C.textDim}}>이름</div>
          <div style={{fontSize:18,fontWeight:800,color:C.text,marginTop:2}}>{student?.name}</div>
          <div style={{fontSize:12,color:C.textMid,marginTop:2}}>{student?.grade} · {student?.klass||student?.grp}</div>
          {tier && <div style={{display:"inline-block",marginTop:8,padding:"3px 10px",borderRadius:20,background:tier.color+"22",border:`1px solid ${tier.color}`,fontSize:12,fontWeight:800,color:tier.color}}>{tier.icon} {tier.label} 등급</div>}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:11,color:C.textDim}}>현재 잔액</div>
          <div style={{fontSize:36,fontWeight:900,color:C.gold,lineHeight:1.1}}>{balance}<span style={{fontSize:16,color:C.goldDim}}> T</span></div>
        </div>
      </div>
      <div style={{marginTop:16}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:12,color:C.textMid}}>
          {next?<React.Fragment><span>다음 등급 {next.icon} {next.label}까지</span><span style={{color:C.goldL,fontWeight:700}}>{Math.max(nextMin-balance,0)}T 남음</span></React.Fragment>:<span style={{color:C.goldL,fontWeight:700}}>👑 최고 등급 달성!</span>}
        </div>
        <div style={{background:C.border,borderRadius:999,height:8,overflow:"hidden"}}><div style={{width:`${seg}%`,height:"100%",background:`linear-gradient(90deg, ${C.gold}, ${C.goldL})`,borderRadius:999,transition:"width 0.5s ease"}}/></div>
      </div>
    </div>
  );
}

// ── 📖 돌아보기 (학생 편집) ─────────────────────
function ReflectionEditor({ reflections, onSave }){
  const thisWeek = weekStartOf(today());
  const [selectedWeek, setSelectedWeek] = useState(thisWeek);
  const [content, setContent] = useState("");
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);
  const weeksList = recentWeeks(12);
  const current = reflections.find(r=>r.week_start===selectedWeek);
  React.useEffect(()=>{
    const r = reflections.find(x=>x.week_start===selectedWeek);
    setContent(r?.content || "");
  }, [selectedWeek, reflections]);
  const submit=async()=>{
    if(!content.trim()) return;
    setBusy(true);
    await onSave(selectedWeek, content.trim());
    setBusy(false); setDone(true); setTimeout(()=>setDone(false),2000);
  };
  const prevPast = reflections.filter(r=>r.week_start!==selectedWeek).sort((a,b)=>b.week_start.localeCompare(a.week_start));
  const isThisWeek = selectedWeek===thisWeek;
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginBottom:14}}>
        <div style={{fontWeight:700,color:C.gold,marginBottom:4}}>📖 청지기 활동 돌아보기</div>
        <div style={{fontSize:12,color:C.textDim,marginBottom:12}}>하나님의 선한 청지기 경주 활동을 돌아보고 작성해요</div>
        <label style={labelStyle}>돌아볼 주 선택</label>
        <select value={selectedWeek} onChange={e=>setSelectedWeek(e.target.value)} style={{...inputStyle,marginBottom:6}}>
          {weeksList.map((ws,i)=>{
            const tag = i===0 ? "이번 주" : i===1 ? "지난 주" : `${i}주 전`;
            const marker = reflections.some(r=>r.week_start===ws) ? " ✍️" : "";
            return <option key={ws} value={ws}>{tag} · {formatWeekRange(ws)}{marker}</option>;
          })}
        </select>
        <div style={{fontSize:11,color:isThisWeek?C.goldL:C.textMid,marginBottom:12,fontWeight:isThisWeek?700:400}}>
          📅 {isThisWeek?"이번 주":"과거 주"}: {formatWeekRange(selectedWeek)}
        </div>
        <textarea value={content} onChange={e=>setContent(e.target.value)} rows={7} placeholder={"이번 주 나의 청지기 활동을 돌아보며...\n• 말씀·기도 생활은 어땠나요?\n• 감사한 일, 아쉬웠던 일은?\n• 다음 주에 노력해 볼 부분은?"} style={{...inputStyle,resize:"vertical",lineHeight:1.6,minHeight:150}}/>
        {current && <div style={{fontSize:11,color:C.textDim,marginTop:8}}>마지막 저장: {new Date(current.updated_at).toLocaleString("ko-KR")}</div>}
        <button onClick={submit} disabled={!content.trim()||busy} style={{marginTop:14,width:"100%",padding:"11px 0",background:done?C.green:`linear-gradient(135deg, ${C.gold}, ${C.goldL})`,color:done?"#fff":"#1A1200",fontWeight:800,fontSize:14,border:"none",borderRadius:8,cursor:content.trim()?"pointer":"not-allowed"}}>{busy?"저장 중...":done?"✓ 저장 완료!":current?"수정하기":"저장하기"}</button>
        <div style={{fontSize:11,color:C.textDim,marginTop:10,textAlign:"center"}}>담임교사·부장교사만 볼 수 있어요</div>
      </div>
      {prevPast.length>0 && (
        <div>
          <div style={{fontWeight:700,color:C.textMid,fontSize:13,marginBottom:10}}>지난 돌아보기 ({prevPast.length}주)</div>
          {prevPast.map(r=>(
            <div key={r.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}} onClick={()=>setSelectedWeek(r.week_start)}>
              <div style={{fontSize:12,color:C.goldL,fontWeight:700,marginBottom:6}}>{formatWeekRange(r.week_start)} <span style={{fontSize:10,color:C.textDim,marginLeft:4}}>· 눌러서 편집</span></div>
              <div style={{fontSize:13,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.6}}>{r.content}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── 💪 나의 다짐 (학생 편집 · 이력형) ──────────
function ResolutionEditor({ resolutions, onAdd, onUpdate, onDelete }){
  const [title,setTitle]=useState("");
  const [content,setContent]=useState("");
  const [editingId,setEditingId]=useState(null);
  const [busy,setBusy]=useState(false);
  const [done,setDone]=useState(false);
  const sorted=[...resolutions].sort((a,b)=>(b.updated_at||"").localeCompare(a.updated_at||""));
  const reset=()=>{setTitle("");setContent("");setEditingId(null);};
  const submit=async()=>{
    if(!content.trim()) return;
    setBusy(true);
    if(editingId){ await onUpdate(editingId, title, content.trim()); }
    else { await onAdd(title, content.trim()); }
    reset(); setBusy(false); setDone(true); setTimeout(()=>setDone(false),2000);
  };
  const startEdit=(r)=>{setEditingId(r.id);setTitle(r.title||"");setContent(r.content);window.scrollTo({top:0,behavior:"smooth"});};
  const confirmDelete=(r)=>{ if(window.confirm(`"${r.title||"이 다짐"}"을 삭제할까요? 되돌릴 수 없어요.`)) onDelete(r.id); };
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{background:"linear-gradient(135deg,#1A2F4F,#142338)",border:`1px solid ${C.goldDim}`,borderRadius:14,padding:18,marginBottom:14}}>
        <div style={{fontSize:13,color:C.text,lineHeight:1.7,fontStyle:"italic",textAlign:"center"}}>“내가 달려갈 길과 주 예수께 받은 사명 곧 하나님의 은혜의 복음 증거하는 일을 마치려 함에는 나의 생명을 조금도 귀한 것으로 여기지 아니하노라”</div>
        <div style={{textAlign:"center",color:C.gold,fontSize:11,fontWeight:700,marginTop:8,letterSpacing:1}}>— 사도행전 20:24 —</div>
      </div>
      <div style={{background:C.card,border:`1px solid ${editingId?C.blue:C.border}`,borderRadius:12,padding:16,marginBottom:14}}>
        <div style={{fontWeight:700,color:editingId?C.blue:C.gold,marginBottom:4}}>
          {editingId ? "✏️ 다짐 수정" : "💪 새로운 다짐 작성"}
        </div>
        <div style={{fontSize:12,color:C.textDim,marginBottom:14}}>
          {editingId ? "이전에 작성한 다짐을 수정하고 있어요" : "신앙 여정의 새로운 단계마다 다짐을 저장하고 이력을 남겨보세요"}
        </div>
        <label style={labelStyle}>다짐 제목 (선택)</label>
        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="예: 학기 초 다짐, 수련회 후, 새 학년 시작" style={{...inputStyle,marginBottom:12}}/>
        <label style={labelStyle}>다짐 내용</label>
        <textarea value={content} onChange={e=>setContent(e.target.value)} rows={7} placeholder={"나의 다짐을 적어 보세요...\n• 나는 왜 선한 청지기가 되고 싶은가?\n• 어떤 부분을 특별히 노력할까?\n• 하나님 앞에서 나의 결단은?"} style={{...inputStyle,resize:"vertical",lineHeight:1.6,minHeight:150}}/>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={submit} disabled={!content.trim()||busy} style={{flex:1,padding:"11px 0",background:done?C.green:`linear-gradient(135deg, ${C.gold}, ${C.goldL})`,color:done?"#fff":"#1A1200",fontWeight:800,fontSize:14,border:"none",borderRadius:8,cursor:content.trim()?"pointer":"not-allowed"}}>{busy?"저장 중...":done?"✓ 저장 완료!":editingId?"수정 저장":"다짐 저장"}</button>
          {editingId && <button onClick={reset} style={{padding:"11px 18px",background:C.surface,color:C.textMid,fontSize:13,border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer"}}>취소</button>}
        </div>
      </div>
      {sorted.length>0 && (
        <div>
          <div style={{fontWeight:700,color:C.textMid,fontSize:13,marginBottom:10}}>💭 나의 다짐 이력 ({sorted.length}개)</div>
          {sorted.map((r,i)=>(
            <div key={r.id} style={{background:C.card,border:`1px solid ${editingId===r.id?C.blue:C.border}`,borderLeft:`4px solid ${i===0?C.gold:C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div style={{flex:1}}>
                  {r.title && <div style={{fontSize:13,fontWeight:800,color:i===0?C.gold:C.goldL,marginBottom:2}}>{i===0?"🌟 ":""}{r.title}</div>}
                  <div style={{fontSize:10,color:C.textDim}}>{new Date(r.updated_at).toLocaleString("ko-KR")}{i===0 && !r.title && " · 최신"}</div>
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>startEdit(r)} style={{background:C.surface,color:C.gold,border:`1px solid ${C.goldDim}`,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>✏️ 수정</button>
                  <button onClick={()=>confirmDelete(r)} style={{background:C.redBg,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer"}}>🗑 삭제</button>
                </div>
              </div>
              <div style={{fontSize:13,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.7,padding:"8px 10px",background:C.surface,borderRadius:6}}>{r.content}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MessageInbox({ messages, allUsers, onMarkRead }){
  React.useEffect(()=>{ if(messages.some(m=>!m.read_at)) onMarkRead(); },[]);
  const senderLabel=(id)=>{
    const u=allUsers.find(x=>x.id===id);
    if(!u) return "익명";
    if(u.role==="parent") return `${u.name} · 👨‍👩‍👧 학부모`;
    return `${u.name} · ${u.is_head?"👑 부장교사":"🧑‍🏫 담임교사"}`;
  };
  const sorted=[...messages].sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));
  if(!sorted.length) return <div style={{textAlign:"center",padding:"40px 20px",color:C.textDim,fontSize:14}}>아직 받은 응원 메시지가 없어요 💌</div>;
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{fontWeight:700,color:C.pink,marginBottom:6}}>💌 받은 응원 메시지</div>
      <div style={{fontSize:12,color:C.textDim,marginBottom:14}}>선생님과 부모님이 보내주신 응원의 말이에요. 힘내서 계속 달려가요!</div>
      {sorted.map(m=>(
        <div key={m.id} style={{background:"linear-gradient(135deg,#3D1A2E,#2A1220)",border:`1px solid ${C.pink}`,borderLeft:`4px solid ${C.pink}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{fontSize:12,color:C.pink,fontWeight:700}}>{senderLabel(m.sender_id)}</div>
            <div style={{fontSize:10,color:C.textDim}}>{new Date(m.created_at).toLocaleString("ko-KR")}</div>
          </div>
          <div style={{fontSize:14,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.7}}>{m.content}</div>
        </div>
      ))}
    </div>
  );
}

function MessageComposer({ recipient, sentMessages, onSend }){
  const [content,setContent]=useState("");
  const [busy,setBusy]=useState(false);
  const [done,setDone]=useState(false);
  const submit=async()=>{
    if(!content.trim()) return;
    setBusy(true);
    await onSend(content.trim());
    setContent(""); setBusy(false); setDone(true); setTimeout(()=>setDone(false),2000);
  };
  const mySent=[...sentMessages].sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""));
  return (
    <div>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${C.pink}`,borderRadius:12,padding:16}}>
        <div style={{fontWeight:700,color:C.pink,marginBottom:6}}>💌 {recipient?.name} 에게 응원 메시지 보내기</div>
        <div style={{fontSize:12,color:C.textDim,marginBottom:14}}>따뜻한 응원의 말을 전해 주세요. 학생이 로그인하면 바로 볼 수 있어요.</div>
        <textarea value={content} onChange={e=>setContent(e.target.value)} rows={4} placeholder={"응원 메시지를 적어 주세요...\n예) 이번 주도 정말 잘했어! 계속 힘내자 :)"} style={{...inputStyle,resize:"vertical",lineHeight:1.6,minHeight:90}}/>
        <button onClick={submit} disabled={!content.trim()||busy} style={{marginTop:12,width:"100%",padding:"11px 0",background:done?C.green:`linear-gradient(135deg, ${C.pink}, #B93E6C)`,color:"#fff",fontWeight:800,fontSize:14,border:"none",borderRadius:8,cursor:content.trim()?"pointer":"not-allowed"}}>{busy?"전송 중...":done?"✓ 전달되었습니다!":"💌 응원 보내기"}</button>
      </div>
      {mySent.length>0 && (
        <div style={{marginTop:14}}>
          <div style={{fontSize:12,color:C.textMid,marginBottom:8}}>💬 내가 보낸 응원 메시지 ({mySent.length}개)</div>
          {mySent.map(m=>(
            <div key={m.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <div style={{fontSize:11,color:m.read_at?C.green:C.amber,fontWeight:700}}>{m.read_at?`✓ 읽음 (${new Date(m.read_at).toLocaleString("ko-KR")})`:"⏳ 미읽음"}</div>
                <div style={{fontSize:10,color:C.textDim}}>{new Date(m.created_at).toLocaleString("ko-KR")}</div>
              </div>
              <div style={{fontSize:13,color:C.text,whiteSpace:"pre-wrap",lineHeight:1.5}}>{m.content}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function Leaderboard({ students, transactions, myId }){
  const ranked=students.map(s=>({...s,balance:getBalance(s.id,transactions)})).sort((a,b)=>b.balance-a.balance);
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{fontWeight:700,color:C.gold,marginBottom:6}}>🏆 전체 청지기 통장 순위</div>

      {ranked.map((s,i)=>{
        const tier=getTier(s.balance),isMe=s.id===myId;
        const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":null;
        return (
          <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:isMe?C.blueBg:C.card,border:`1px solid ${isMe?C.blue:C.border}`,borderRadius:10,marginBottom:8}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:30,textAlign:"center",fontWeight:900,fontSize:16,color:i<3?C.goldL:C.textDim}}>{medal||(i+1)}</div>
              <div><div style={{fontWeight:700,fontSize:14}}>{s.name}{isMe && <span style={{color:C.blue,fontSize:11,marginLeft:6}}>(나)</span>}</div><div style={{fontSize:11,color:C.textDim}}>{s.grade} · {s.klass} · {tier?`${tier.icon} ${tier.label}`:"도전 중"}</div></div>
            </div>
            <div style={{fontSize:20,fontWeight:900,color:C.gold}}>{s.balance}<span style={{fontSize:12,color:C.goldDim}}>T</span></div>
          </div>
        );
      })}
    </div>
  );
}

function StudentBook({ currentUser, student, allStudents, allTransactions, allUsers, transactions, reflections, resolutions, messages, onApply, onSaveReflection, onAddResolution, onUpdateResolution, onDeleteResolution, onMarkRead, logout, onPhotoClick, onOpenPwModal }){
  const [tab,setTab]=useState("book");
  const balance=transactions.filter(t=>t.status==="approved").reduce((s,t)=>s+t.amount,0);
  const unreadCount=messages.filter(m=>!m.read_at).length;
  return (
    <div style={{maxWidth:480,margin:"0 auto",padding:"0 0 80px"}}>
      <TopBar title="✝ 선한 청지기 통장" subtitle={`무등교회 중고등부 · ${student.klass}`} logout={logout} onOpenPwModal={onOpenPwModal}/>
      <div style={{margin:"20px 16px"}}><BankCard student={student} balance={balance}/></div>
      <div style={{display:"flex",gap:8,padding:"0 16px 16px",flexWrap:"wrap"}}>
        <TabBtn active={tab==="book"} onClick={()=>setTab("book")}>청지기 활동</TabBtn>
        <TabBtn active={tab==="apply"} onClick={()=>setTab("apply")}>입출금 신청</TabBtn>
        <TabBtn active={tab==="message"} onClick={()=>setTab("message")}>💌 응원 메시지{unreadCount>0?` 🔴${unreadCount}`:""}</TabBtn>
        <TabBtn active={tab==="rank"} onClick={()=>setTab("rank")}>🏆 전체 순위</TabBtn>
        <TabBtn active={tab==="reward"} onClick={()=>setTab("reward")}>🎁 보상 안내</TabBtn>
        <TabBtn active={tab==="reflect"} onClick={()=>setTab("reflect")}>📖 돌아보기</TabBtn>
        <TabBtn active={tab==="pledge"} onClick={()=>setTab("pledge")}>💪 나의 다짐</TabBtn>
      </div>
      {tab==="book" && <TransactionList transactions={transactions} showStatus onPhotoClick={onPhotoClick}/>}
      {tab==="apply" && <ApplyForm studentId={currentUser.id} onApply={(tx)=>{onApply(tx);setTab("book");}}/>}
      {tab==="message" && <MessageInbox messages={messages} allUsers={allUsers} onMarkRead={onMarkRead}/>}
      {tab==="rank" && <Leaderboard students={allStudents} transactions={allTransactions} myId={currentUser.id}/>}

    </div>
  );
}

function ApplyForm({ studentId, onApply }){
  const [type,setType]=useState("deposit");
  const [selectedId,setSelectedId]=useState("");
  const [customLabel,setCustomLabel]=useState("");
  const [customAmount,setCustomAmount]=useState("");
  const [date,setDate]=useState(today());
  const [note,setNote]=useState("");
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [busy,setBusy]=useState(false);
  const isDeposit=type==="deposit";
  const items=isDeposit?DEPOSIT_ITEMS:WITHDRAW_ITEMS;
  const selected=items.find(i=>i.id===selectedId);
  const isCustom=selected?.amount===null;
  const finalAmount=isCustom?(isDeposit?Math.abs(+customAmount):-Math.abs(+customAmount)):(selected?.amount??0);
  const categories=isDeposit?[...new Set(DEPOSIT_ITEMS.map(i=>i.category))]:null;
  const reset=()=>{setSelectedId("");setCustomLabel("");setCustomAmount("");setNote("");setFile(null);setPreview(null);};
  const switchType=(t)=>{setType(t);reset();};
  const submit=async()=>{
    if(!selected||(isCustom&&!customAmount)) return;
    setBusy(true);
    const photo_url=file?await uploadPhoto(file):null;
    await onApply({ student_id:studentId,type,label:selected.label+(customLabel?` (${customLabel})`:""),amount:finalAmount,tx_date:date,note,status:"pending",approved_by:null,photo_url });
    setBusy(false);
  };
  return (
    <div style={{padding:"0 16px"}}>
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
        <div style={{fontWeight:700,color:C.gold,marginBottom:14}}>달란트 입·출금 신청</div>
        <label style={labelStyle}>신청 유형</label>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[["deposit","📥 입금 신청"],["withdraw","📤 출금 신청"]].map(([v,l])=>(
            <button key={v} onClick={()=>switchType(v)} style={{flex:1,padding:"9px 0",borderRadius:7,fontWeight:700,fontSize:13,cursor:"pointer",background:type===v?(v==="deposit"?C.green:C.red):C.surface,border:`1px solid ${type===v?(v==="deposit"?C.green:C.red):C.border}`,color:type===v?"#fff":C.textMid}}>{l}</button>
          ))}
        </div>
        <label style={labelStyle}>{isDeposit?"실천 항목 선택":"출금 항목 선택"}</label>
        {isDeposit ? categories.map(cat=>(
          <div key={cat} style={{marginBottom:8}}>
            <div style={{fontSize:11,color:C.textDim,marginBottom:4}}>{cat}</div>
            {DEPOSIT_ITEMS.filter(i=>i.category===cat).map(item=>(
              <div key={item.id} onClick={()=>setSelectedId(item.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,marginBottom:4,cursor:"pointer",background:selectedId===item.id?C.greenBg:C.surface,border:`1px solid ${selectedId===item.id?C.green:C.border}`}}>
                <span style={{fontSize:13,color:C.text}}>{item.label}</span><span style={{fontSize:14,fontWeight:800,color:C.green}}>+{item.amount}T</span>
              </div>
            ))}
          </div>
        )) : WITHDRAW_ITEMS.map(item=>(
          <div key={item.id} onClick={()=>setSelectedId(item.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderRadius:8,marginBottom:4,cursor:"pointer",background:selectedId===item.id?C.redBg:C.surface,border:`1px solid ${selectedId===item.id?C.red:C.border}`}}>
            <span style={{fontSize:13,color:C.text}}>{item.label}</span><span style={{fontSize:14,fontWeight:800,color:C.red}}>{item.amount!=null?`${item.amount}T`:"직접 입력"}</span>
          </div>
        ))}
        {isCustom && (
          <div style={{marginTop:8}}>
            <label style={labelStyle}>세부 내용</label>
            <input value={customLabel} onChange={e=>setCustomLabel(e.target.value)} placeholder={isDeposit?"예: (가정생활) 스마트폰 사용 시간을 지키고 부모님께 맡김":"예: (가정생활) 부모님께 대들었음"} style={{...inputStyle,marginBottom:6}}/>
            <div style={{fontSize:11,color:C.textDim,marginBottom:10,lineHeight:1.5,padding:"7px 10px",background:C.purpleBg,borderRadius:6,border:`1px solid ${C.purple}`}}>
              💡 <strong style={{color:C.purple}}>가정생활</strong> 관련 내용이면 앞에 <strong style={{color:C.purple}}>(가정생활)</strong>을 붙여 주세요.<br/>학부모님이 승인 처리할 수 있습니다.
            </div>
            <label style={labelStyle}>{isDeposit?"추가 달란트 (숫자만)":"차감 달란트 (숫자만)"}</label>
            <input type="number" value={customAmount} onChange={e=>setCustomAmount(e.target.value)} placeholder="예: 10" style={{...inputStyle,marginBottom:4}}/>
          </div>
        )}
        <label style={{...labelStyle,marginTop:12}}>날짜</label>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inputStyle,marginBottom:12}}/>
        <PhotoInput file={file} setFile={setFile} preview={preview} setPreview={setPreview}/>
        <label style={labelStyle}>메모 (선택)</label>
        <input value={note} onChange={e=>setNote(e.target.value)} placeholder="예: 6월 14일 토요교제 간증" style={{...inputStyle,marginBottom:16}}/>
        {selected && !isCustom && (
          <div style={{padding:"10px 14px",background:isDeposit?C.greenBg:C.redBg,borderRadius:8,marginBottom:14,fontSize:13}}>
            <strong style={{color:C.goldL}}>{selected.label}</strong> → <strong style={{color:isDeposit?C.green:C.red}}>{isDeposit?"+":""}{selected.amount}T</strong>
            <div style={{fontSize:11,color:C.textDim,marginTop:4}}>담임교사·부장교사·학부모 승인 후 반영됩니다</div>
          </div>
        )}
        <button onClick={submit} disabled={!selected||(isCustom&&!customAmount)||busy} style={{width:"100%",padding:"12px 0",background:(selected&&!busy)?`linear-gradient(135deg, ${isDeposit?C.green:C.red}, ${isDeposit?"#2A8A55":"#A83030"})`:C.border,color:"#fff",fontWeight:800,fontSize:15,border:"none",borderRadius:8,cursor:selected?"pointer":"not-allowed"}}>{busy?"제출 중...":(isDeposit?"입금 신청하기":"출금 신청하기")}</button>
      </div>
    </div>
  );
}

function TransactionList({ transactions, showStatus, onPhotoClick }){
  const sorted=[...transactions].sort((a,b)=>(b.tx_date||"").localeCompare(a.tx_date||""));
  if(!sorted.length) return <div style={{textAlign:"center",padding:"40px 20px",color:C.textDim,fontSize:14}}>청지기 활동이 없습니다</div>;
  return (
    <div style={{padding:"0 16px"}}>
      {sorted.map(t=>{
        const dep=t.amount>0;
        const sc=t.status==="approved"?C.green:t.status==="pending"?C.amber:C.red;
        const sl=t.status==="approved"?"승인":t.status==="pending"?"대기중":"반려";
        return (
          <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 14px",background:C.card,border:`1px solid ${C.border}`,borderRadius:10,marginBottom:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text}}>{t.label}</div>
              <div style={{fontSize:11,color:C.textDim,marginTop:2}}>{formatDate(t.tx_date)}{t.note?` · ${t.note}`:""}</div>
              {showStatus && <div style={{display:"inline-block",marginTop:4,fontSize:10,fontWeight:700,color:sc,background:sc+"22",padding:"2px 8px",borderRadius:4}}>{sl}</div>}
            </div>
            <PhotoThumb url={t.photo_url} onClick={onPhotoClick}/>
            <div style={{fontSize:18,fontWeight:900,color:dep?C.green:C.red,minWidth:64,textAlign:"right",marginLeft:8}}>{dep?"+":""}{t.amount}T</div>
          </div>
        );
      })}
    </div>
  );
}

function DirectRecord({ students, lockedStudentId, recorderId, onRecord }){
  const [studentId,setStudentId]=useState(lockedStudentId||"");
  const [type,setType]=useState("deposit");
  const [itemId,setItemId]=useState("");
  const [customLabel,setCustomLabel]=useState("");
  const [customAmount,setCustomAmount]=useState("");
  const [date,setDate]=useState(today());
  const [note,setNote]=useState("");
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [busy,setBusy]=useState(false);
  const [done,setDone]=useState(false);
  const items=type==="deposit"?DEPOSIT_ITEMS:WITHDRAW_ITEMS;
  const selected=items.find(i=>i.id===itemId);
  const isCustom=selected?.amount===null;
  const finalAmount=isCustom?(type==="deposit"?+customAmount:-Math.abs(+customAmount)):(selected?.amount??0);
  const reset=()=>{setItemId("");setCustomLabel("");setCustomAmount("");setNote("");setFile(null);setPreview(null);};
  const submit=async()=>{
    const sid=lockedStudentId||studentId;
    if(!sid||!itemId||(isCustom&&!customAmount)) return;
    setBusy(true);
    const photo_url=file?await uploadPhoto(file):null;
    await onRecord({ student_id:sid,type,label:selected.label+(customLabel?` (${customLabel})`:""),amount:finalAmount,tx_date:date,note,status:"approved",approved_by:recorderId,photo_url });
    setBusy(false);setDone(true);setTimeout(()=>{setDone(false);reset();},1800);
  };
  return (
    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16}}>
      <div style={{fontWeight:700,color:C.gold,marginBottom:14}}>✍️ 직접 입출금 기록 (즉시 반영)</div>
      {!lockedStudentId && (
        <React.Fragment>
          <label style={labelStyle}>학생 선택</label>
          <select value={studentId} onChange={e=>setStudentId(e.target.value)} style={{...inputStyle,marginBottom:12}}>
            <option value="">-- 학생 선택 --</option>
            {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.grade} · {s.klass})</option>)}
          </select>
        </React.Fragment>
      )}
      <label style={labelStyle}>유형</label>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        {[["deposit","입금 (+)"],["withdraw","출금 (-)"]].map(([v,l])=>(
          <button key={v} onClick={()=>{setType(v);setItemId("");}} style={{flex:1,padding:"8px 0",borderRadius:7,fontWeight:700,fontSize:13,cursor:"pointer",background:type===v?(v==="deposit"?C.green:C.red):C.surface,border:`1px solid ${type===v?(v==="deposit"?C.green:C.red):C.border}`,color:type===v?"#fff":C.textMid}}>{l}</button>
        ))}
      </div>
      <label style={labelStyle}>항목 선택</label>
      <select value={itemId} onChange={e=>setItemId(e.target.value)} style={{...inputStyle,marginBottom:12}}>
        <option value="">-- 항목 선택 --</option>
        {items.map(i=><option key={i.id} value={i.id}>{i.label} {i.amount!=null?`(${i.amount>0?"+":""}${i.amount}T)`:"(직접 입력)"}</option>)}
      </select>
      {isCustom && (
        <React.Fragment>
          <label style={labelStyle}>세부 내용</label>
          <input value={customLabel} onChange={e=>setCustomLabel(e.target.value)} placeholder={type==="deposit"?"예: (가정생활) 스마트폰 사용 시간을 지키고 부모님께 맡김":"예: (가정생활) 부모님께 대들었음"} style={{...inputStyle,marginBottom:6}}/>
          <div style={{fontSize:11,color:C.textDim,marginBottom:10,lineHeight:1.5,padding:"7px 10px",background:C.purpleBg,borderRadius:6,border:`1px solid ${C.purple}`}}>
            💡 가정생활 관련 내용이면 앞에 <strong style={{color:C.purple}}>(가정생활)</strong>을 붙이세요. 학부모님도 승인 처리할 수 있게 됩니다.
          </div>
          <label style={labelStyle}>달란트 수 (숫자만)</label>
          <input type="number" value={customAmount} onChange={e=>setCustomAmount(e.target.value)} placeholder="예: 10" style={{...inputStyle,marginBottom:12}}/>
        </React.Fragment>
      )}
      <label style={labelStyle}>날짜</label>
      <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inputStyle,marginBottom:12}}/>
      <PhotoInput file={file} setFile={setFile} preview={preview} setPreview={setPreview}/>
      <label style={labelStyle}>메모 (선택)</label>
      <input value={note} onChange={e=>setNote(e.target.value)} placeholder="메모" style={{...inputStyle,marginBottom:16}}/>
      {selected && !isCustom && (
        <div style={{padding:"10px 14px",background:type==="deposit"?C.greenBg:C.redBg,borderRadius:8,marginBottom:14,fontSize:13}}>
          <strong>{selected.label}</strong> → <strong style={{color:type==="deposit"?C.green:C.red}}>{finalAmount>0?"+":""}{finalAmount}T</strong>
        </div>
      )}
      <button onClick={submit} disabled={(!lockedStudentId&&!studentId)||!itemId||(isCustom&&!customAmount)||busy} style={{width:"100%",padding:"12px 0",background:done?C.green:`linear-gradient(135deg, ${C.gold}, ${C.goldL})`,color:done?"#fff":"#1A1200",fontWeight:800,fontSize:15,border:"none",borderRadius:8,cursor:"pointer"}}>{busy?"저장 중...":done?"✓ 기록 완료!":"즉시 기록"}</button>
    </div>
  );
}

function PendingApprovals({ transactions, students, allowedStudentIds, onApprove, onReject, onPhotoClick }){
  const pending=transactions.filter(t=>t.status==="pending"&&allowedStudentIds.includes(t.student_id)).sort((a,b)=>(a.tx_date||"").localeCompare(b.tx_date||""));
  if(!pending.length) return <div style={{textAlign:"center",padding:"40px 20px",color:C.textDim}}>승인할 대기 신청이 없습니다 ✓</div>;
  return (
    <div>
      <div style={{fontSize:13,color:C.textMid,marginBottom:12}}>총 {pending.length}건 승인 대기 중 (내 승인 권한 범위)</div>
      {pending.map(t=>{
        const st=students.find(s=>s.id===t.student_id);
        const dep=t.amount>0;
        return (
          <div key={t.id} style={{background:C.card,border:`1px solid ${C.amberBg}`,borderLeft:`4px solid ${C.amber}`,borderRadius:10,padding:14,marginBottom:10}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div><div style={{fontWeight:700,fontSize:15}}>{st?.name} <span style={{fontSize:11,color:C.textDim}}>· {st?.klass}</span> <span style={{fontSize:11,color:dep?C.green:C.red}}>{dep?"입금 신청":"출금 신청"}</span></div><div style={{fontSize:12,color:C.textDim}}>{formatDate(t.tx_date)}</div></div>
              <div style={{fontSize:20,fontWeight:900,color:dep?C.green:C.red}}>{dep?"+":""}{t.amount}T</div>
            </div>
            <div style={{fontSize:13,color:C.text,marginBottom:t.note?4:0}}>{t.label}</div>
            {t.note && <div style={{fontSize:11,color:C.textDim}}>💬 {t.note}</div>}
            {t.photo_url && <img src={t.photo_url} onClick={()=>onPhotoClick(t.photo_url)} style={{marginTop:10,width:"100%",maxWidth:200,borderRadius:8,cursor:"pointer",border:`1px solid ${C.border}`}}/>}
            <div style={{display:"flex",gap:8,marginTop:12}}>
              <button onClick={()=>onApprove(t.id)} style={{flex:1,padding:"9px 0",background:C.green,color:"#fff",fontWeight:700,fontSize:13,border:"none",borderRadius:7,cursor:"pointer"}}>✓ 승인</button>
              <button onClick={()=>onReject(t.id)} style={{flex:1,padding:"9px 0",background:C.redBg,color:C.red,fontWeight:700,fontSize:13,border:`1px solid ${C.red}`,borderRadius:7,cursor:"pointer"}}>✗ 반려</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ParentDashboard({ parent, child, transactions, messages, onApprove, onReject, onSendMessage, logout, onPhotoClick, onOpenPwModal }){
  const [tab,setTab]=useState("book");
  const balance=transactions.filter(t=>t.status==="approved").reduce((s,t)=>s+t.amount,0);
  const familyPending = transactions.filter(t=>t.status==="pending" && isFamilyLife(t.label));
  const pendingCount = familyPending.length;
  return (
    <div style={{maxWidth:480,margin:"0 auto",padding:"0 0 80px"}}>
      <TopBar title="✝ 선한 청지기 통장" subtitle={`${parent.name} · 학부모`} logout={logout} onOpenPwModal={onOpenPwModal}/>
      <div style={{margin:"20px 16px"}}><BankCard student={child} balance={balance}/></div>
      <div style={{display:"flex",gap:8,padding:"0 16px 16px",flexWrap:"wrap"}}>
        <TabBtn active={tab==="book"} onClick={()=>setTab("book")}>청지기 활동</TabBtn>
        <TabBtn active={tab==="pending"} onClick={()=>setTab("pending")}>⏳ 승인 대기 {pendingCount>0?`(${pendingCount})`:""}</TabBtn>
        <TabBtn active={tab==="message"} onClick={()=>setTab("message")}>💌 응원 보내기</TabBtn>

      {tab==="pending" && (
        <div style={{padding:"0 16px"}}>
          <div style={{padding:"10px 14px",background:C.purpleBg,border:`1px solid ${C.purple}`,borderRadius:8,fontSize:12,color:C.purple,marginBottom:12,lineHeight:1.6}}>
            👨‍👩‍👧 자녀({child?.name})의 <strong>🏠 가정생활</strong> 항목만 승인/반려할 수 있습니다<br/>
            <span style={{fontSize:11,color:C.textDim}}>· 입금: 집안일 돕기, 개인기도, 부모님 말씀 순종, 스마트폰 부모님께 맡기기<br/>· 출금: 부모님 말씀 불순종</span>
          </div>
          <PendingApprovals transactions={familyPending} students={child?[child]:[]} allowedStudentIds={child?[child.id]:[]} onApprove={onApprove} onReject={onReject} onPhotoClick={onPhotoClick}/>
        </div>
      )}
      {tab==="message" && (
        <div style={{padding:"0 16px"}}>
          <MessageComposer recipient={child} sentMessages={(messages||[]).filter(m=>m.sender_id===parent.id)} onSend={onSendMessage}/>

      {tab==="reward" && <RewardLadder balance={balance}/>}

function TeacherDashboard({ teacher, allStudents, transactions, reflections, resolutions, messages, allUsers, onApprove, onReject, onDirectRecord, onAddStudent, onSendMessage, allMembers, onAddTeacher, onAddParent, onRemoveMember, onUpdateMember, logout, onPhotoClick, onOpenPwModal }){
  const [tab,setTab]=useState("overview");
  const [sel,setSel]=useState(null);
  const manageable=manageableStudents(teacher,allStudents);
  const allowedIds=manageable.map(s=>s.id);
  const pendingCount=transactions.filter(t=>t.status==="pending"&&allowedIds.includes(t.student_id)).length;
  const scopeLabel=teacher.is_head?"전체 학생":`${teacher.klass} 담임`;
  const tabs=[["overview","📊 전체 현황"],["pending",`⏳ 승인 대기 ${pendingCount>0?`(${pendingCount})`:""}`],["record","✍️ 직접 기록"],["reward","🎁 보상 안내"],["manage","👥 학생 관리"]];
  if(teacher.is_head){ tabs.push(["teachers","🧑‍🏫 교사 관리"]); tabs.push(["parents","👨‍👩‍👧 학부모 관리"]); }
  return (
    <div style={{maxWidth:640,margin:"0 auto",paddingBottom:80}}>
      <TopBar title="✝ 선한 청지기 통장" subtitle={`${teacher.is_head?"부장교사":"담임교사"} · ${scopeLabel}`} right={teacher.name} logout={logout} onOpenPwModal={onOpenPwModal}/>
      <div style={{display:"flex",gap:6,padding:"14px 16px 0",flexWrap:"wrap"}}>
        {tabs.map(([k,l])=>(
          <TabBtn key={k} active={tab===k} onClick={()=>{setTab(k);setSel(null);}}>{l}</TabBtn>
        ))}
      </div>
      <div style={{padding:"16px 16px 0"}}>
        {tab==="overview" && <TeacherOverview teacher={teacher} students={allStudents} manageableIds={allowedIds} transactions={transactions} reflections={reflections} resolutions={resolutions} messages={messages} onSendMessage={onSendMessage} onSelect={setSel} selectedStudent={sel} onPhotoClick={onPhotoClick}/>}
        {tab==="pending" && (
          <React.Fragment>
            <div style={{padding:"10px 14px",background:C.blueBg,border:`1px solid ${C.blue}`,borderRadius:8,fontSize:12,color:C.blue,marginBottom:12}}>
              {teacher.is_head ? "👑 부장교사 — 전체 학생의 신청을 승인/반려할 수 있습니다" : `🧑‍🏫 ${teacher.klass} 담임 — 우리 반 학생의 신청만 승인/반려할 수 있습니다`}
            </div>
            <PendingApprovals transactions={transactions} students={allStudents} allowedStudentIds={allowedIds} onApprove={onApprove} onReject={onReject} onPhotoClick={onPhotoClick}/>
          </React.Fragment>
        )}
        {tab==="record" && (
          <React.Fragment>
            <div style={{padding:"10px 14px",background:C.blueBg,border:`1px solid ${C.blue}`,borderRadius:8,fontSize:12,color:C.blue,marginBottom:12}}>
              기록 가능한 학생: <strong>{teacher.is_head?"전체":teacher.klass}</strong> ({manageable.length}명)
            </div>
            <DirectRecord students={manageable} recorderId={teacher.id} onRecord={onDirectRecord}/>
          </React.Fragment>
        )}
        {tab==="reward" && <RewardLadder balance={null}/>}
        {tab==="manage" && <StudentManage teacher={teacher} students={allStudents} onAdd={onAddStudent} onUpdate={onUpdateMember} onRemove={onRemoveMember}/>}
        {tab==="teachers" && <TeacherManage teachers={allMembers.filter(u=>u.role==="teacher")} onAdd={onAddTeacher} onUpdate={onUpdateMember} onRemove={onRemoveMember} meId={teacher.id}/>}
        {tab==="parents" && <ParentManage parents={allMembers.filter(u=>u.role==="parent")} students={allStudents} onAdd={onAddParent} onUpdate={onUpdateMember} onRemove={onRemoveMember}/>}
      </div>
    </div>
  );
}

function TeacherOverview({ teacher, students, manageableIds, transactions, reflections, resolutions, messages, onSendMessage, onSelect, selectedStudent, onPhotoClick }){
  const ranked=students.map(s=>({...s,balance:getBalance(s.id,transactions)})).sort((a,b)=>b.balance-a.balance);
  const myScope=students.filter(s=>manageableIds.includes(s.id));
  const avg=Math.round(ranked.reduce((s,r)=>s+r.balance,0)/(students.length||1));
  const rewardCount=ranked.filter(r=>getTier(r.balance)).length;
  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        <StatCard label={teacher.is_head?"전체 학생":"담당(우리 반)"} value={(teacher.is_head?students.length:myScope.length)+"명"}/>
        <StatCard label="평균 달란트" value={avg+"T"}/>
        <StatCard label="보상 등급 도달" value={rewardCount+"명"} color={C.green}/>
        <StatCard label="내 승인 대기" value={transactions.filter(t=>t.status==="pending"&&manageableIds.includes(t.student_id)).length+"건"} color={C.amber}/>
      </div>
      <div style={{fontWeight:700,color:C.textMid,fontSize:13,marginBottom:10}}>🏆 전체 달란트 현황 (순위)</div>
      {ranked.map((s,i)=>{
        const tier=getTier(s.balance),next=getNextTier(s.balance);
        const prevMin=tier?tier.min:0,nextMin=next?next.min:1000;
        const prog=next?Math.min(((s.balance-prevMin)/(nextMin-prevMin))*100,100):100;
        const isSel=selectedStudent?.id===s.id;
        const mine=manageableIds.includes(s.id);
        return (
          <div key={s.id} onClick={()=>onSelect(isSel?null:s)} style={{background:isSel?C.blueBg:C.card,border:`1px solid ${isSel?C.blue:C.border}`,borderRadius:10,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:i<3?C.goldDim:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:i<3?C.goldL:C.textDim}}>{i+1}</div>
                <div><div style={{fontWeight:700,fontSize:14}}>{s.name}{tier && <span style={{marginLeft:6,fontSize:12}}>{tier.icon}</span>}{mine && <span style={{marginLeft:6,fontSize:10,color:C.blue,background:C.blueBg,padding:"1px 6px",borderRadius:4}}>담당</span>}</div><div style={{fontSize:11,color:C.textDim}}>{s.grade} · {s.klass} · {tier?tier.label:"도전 중"}</div></div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:20,fontWeight:900,color:C.gold}}>{s.balance}<span style={{fontSize:12,color:C.goldDim}}>T</span></div>
                {next?<div style={{fontSize:10,color:C.textDim}}>{next.icon}까지 {nextMin-s.balance}T</div>:<div style={{fontSize:10,color:C.goldL}}>👑 최고 등급</div>}
              </div>
            </div>
            <div style={{marginTop:8,background:C.border,borderRadius:999,height:5}}><div style={{width:`${prog}%`,height:"100%",background:`linear-gradient(90deg, ${C.gold}, ${C.goldL})`,borderRadius:999}}/></div>
          </div>
        );
      })}
      {selectedStudent && (
        <div style={{marginTop:12,background:C.card,border:`1px solid ${C.blue}`,borderRadius:12,padding:14}}>
          <div style={{fontWeight:700,color:C.blue,marginBottom:10}}>{selectedStudent.name} ({selectedStudent.klass}) 청지기 활동</div>
          <TransactionList transactions={transactions.filter(t=>t.student_id===selectedStudent.id)} showStatus onPhotoClick={onPhotoClick}/>
          {manageableIds.includes(selectedStudent.id) ? (
            <React.Fragment>
              <div style={{borderTop:`1px dashed ${C.border}`,marginTop:14,paddingTop:10}}>
                <ReflectionViewer student={selectedStudent} reflections={reflections||[]}/>
              </div>
              <div style={{borderTop:`1px dashed ${C.border}`,marginTop:14,paddingTop:10}}>
                <ResolutionViewer student={selectedStudent} resolutions={(resolutions||[]).filter(r=>r.student_id===selectedStudent.id)}/>
              </div>
              <div style={{borderTop:`1px dashed ${C.border}`,marginTop:14,paddingTop:14}}>
                <MessageComposer
                  recipient={selectedStudent}
                  sentMessages={(messages||[]).filter(m=>m.student_id===selectedStudent.id && m.sender_id===teacher.id)}
                  onSend={(c)=>onSendMessage(selectedStudent.id, c)}
                />
              </div>
            </React.Fragment>
          ) : (
            <div style={{marginTop:14,padding:"12px 14px",background:C.surface,border:`1px dashed ${C.border}`,borderRadius:8,fontSize:12,color:C.textDim,textAlign:"center",lineHeight:1.6}}>
              📖 돌아보기 · 💪 다짐 · 💌 응원 메시지는<br/>
              <strong style={{color:C.textMid}}>{selectedStudent.klass} 담임교사와 부장교사</strong>만 볼 수 있어요
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function StudentManage({ teacher, students, onAdd, onUpdate, onRemove }){
  const [editingId, setEditingId] = useState(null);
  const [name,setName]=useState("");
  const [loginId,setLoginId]=useState("");
  const [grade,setGrade]=useState("중1");
  const [klass,setKlass]=useState(teacher.klass||"");
  const [password,setPassword]=useState("");
  const [done,setDone]=useState(false);
  const grades=["중1","중2","중3","고1","고2","고3"];
  const visible=teacher.is_head?students:students.filter(s=>s.klass===teacher.klass);
  
  const startEdit = (s) => {
      setEditingId(s.id); setName(s.name); setLoginId(s.login_id); setGrade(s.grade); setKlass(s.klass); setPassword(s.password);
  };
  const cancelEdit = () => {
      setEditingId(null); setName(""); setLoginId(""); setGrade("중1"); setKlass(teacher.klass||""); setPassword("");
  };

  const submit=async()=>{
    if(!name||!loginId||!password||!klass) return;
    const grp=grade.startsWith("중")?"중학부":"고등부";
    if(editingId) {
        await onUpdate(editingId, { name, login_id:loginId, grade, klass, grp, password });
    } else {
        await onAdd({ name, login_id:loginId, grade, klass, grp, password });
    }
    cancelEdit(); setDone(true);setTimeout(()=>setDone(false),2000);
  };

  return (
    <div>
      <div style={{fontWeight:700,color:C.textMid,fontSize:13,marginBottom:10}}>{teacher.is_head?"전체 학생":`${teacher.klass} 학생`} ({visible.length}명)</div>
      {visible.map(s=>(
        <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:C.card,border:`1px solid ${editingId===s.id?C.blue:C.border}`,borderRadius:9,marginBottom:7}}>
          <div><span style={{fontWeight:700}}>{s.name}</span><span style={{fontSize:12,color:C.textDim,marginLeft:8}}>{s.grade} · {s.klass}</span></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:C.textDim}}>ID: {s.login_id}</span>
            <button onClick={()=>startEdit(s)} style={{background:C.surface,color:C.blue,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>수정</button>
            <button onClick={()=>{ if(window.confirm(`정말 '${s.name}' 계정을 삭제하시겠습니까?`)) onRemove(s.id); }} style={{background:C.redBg,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>삭제</button>
          </div>
        </div>
      ))}
      <div style={{background:C.card,border:`1px solid ${editingId?C.blue:C.border}`,borderRadius:12,padding:16,marginTop:16}}>
        <div style={{fontWeight:700,color:editingId?C.blue:C.gold,marginBottom:14}}>{editingId ? "✏️ 학생 정보 수정" : "➕ 학생 추가"}</div>
        {!editingId && <div style={{fontSize:12,color:C.green,marginBottom:14}}>🎁 등록 시 기본 달란트 50점이 지급된다고 공지됩니다</div>}
        <label style={labelStyle}>이름</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="학생 이름" style={{...inputStyle,marginBottom:12}}/>
        <label style={labelStyle}>로그인 아이디 (영문/숫자)</label>
        <input value={loginId} onChange={e=>setLoginId(e.target.value)} placeholder="예: student5" style={{...inputStyle,marginBottom:12}}/>
        <label style={labelStyle}>학년</label>
        <select value={grade} onChange={e=>setGrade(e.target.value)} style={{...inputStyle,marginBottom:12}}>
          {grades.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
        <label style={labelStyle}>분반 (직접 입력)</label>
        <input value={klass} onChange={e=>setKlass(e.target.value)} placeholder="예: 사랑반, 소망반, 믿음반 ..." style={{...inputStyle,marginBottom:12}}/>
        <label style={labelStyle}>비밀번호</label>
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="숫자 4자리 권장" style={{...inputStyle,marginBottom:16}}/>
        
        <div style={{display:"flex",gap:8}}>
          <button onClick={submit} disabled={!name||!loginId||!password||!klass} style={{flex:1,padding:"11px 0",background:done?C.green:`linear-gradient(135deg, ${editingId?C.blue:C.gold}, ${editingId?"#4A90D9":"#F0D060"})`,color:done?"#fff":(editingId?"#fff":"#1A1200"),fontWeight:800,fontSize:14,border:"none",borderRadius:8,cursor:"pointer"}}>{done?"✓ 완료!":(editingId?"수정 저장":"학생 등록")}</button>
          {editingId && <button onClick={cancelEdit} style={{padding:"11px 18px",background:C.surface,color:C.textMid,fontSize:13,border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer"}}>취소</button>}
        </div>
      </div>
    </div>
  );
}

function TeacherManage({ teachers, onAdd, onUpdate, onRemove, meId }){
  const [editingId, setEditingId] = useState(null);
  const [name,setName]=useState("");
  const [loginId,setLoginId]=useState("");
  const [isHead,setIsHead]=useState(false);
  const [klass,setKlass]=useState("");
  const [password,setPassword]=useState("");
  const [done,setDone]=useState(false);

  const startEdit = (t) => {
    setEditingId(t.id); setName(t.name); setLoginId(t.login_id); setIsHead(t.is_head); setKlass(t.klass||""); setPassword(t.password);
  };
  const cancelEdit = () => {
    setEditingId(null); setName(""); setLoginId(""); setKlass(""); setPassword(""); setIsHead(false);
  };

  const submit=async()=>{
    if(!name||!loginId||!password) return;
    if(!isHead&&!klass) return;
    if (editingId) {
       await onUpdate(editingId, { name, login_id:loginId, is_head:isHead, klass:isHead?null:klass, password });
    } else {
       await onAdd({ name, login_id:loginId, is_head:isHead, klass:isHead?null:klass, password });
    }
    cancelEdit();
    setDone(true);setTimeout(()=>setDone(false),2000);
  };

  return (
    <div>
      <div style={{fontWeight:700,color:C.textMid,fontSize:13,marginBottom:10}}>전체 교사 ({teachers.length}명)</div>
      {teachers.map(t=>(
        <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:C.card,border:`1px solid ${editingId===t.id?C.blue:C.border}`,borderRadius:9,marginBottom:7}}>
          <div><span style={{fontWeight:700}}>{t.name}</span><span style={{fontSize:11,color:t.is_head?C.gold:C.textMid,marginLeft:8,fontWeight:700}}>{t.is_head?"👑 부장교사":`담임 · ${t.klass||"-"}`}</span></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:C.textDim}}>ID: {t.login_id}</span>
            <button onClick={()=>startEdit(t)} style={{background:C.surface,color:C.blue,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>수정</button>
            {t.id!==meId && <button onClick={()=>{ if(window.confirm(`새로운 부장교사를 등록하셨다면 기존 데모 부장교사를 삭제하실 수 있습니다.\n\n정말 '${t.name}' 계정을 삭제하시겠습니까?`)) onRemove(t.id); }} style={{background:C.redBg,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>삭제</button>}
          </div>
        </div>
      ))}
      <div style={{background:C.card,border:`1px solid ${editingId?C.blue:C.border}`,borderRadius:12,padding:16,marginTop:16}}>
        <div style={{fontWeight:700,color:editingId?C.blue:C.gold,marginBottom:14}}>{editingId ? "✏️ 교사 정보 수정" : "➕ 교사 추가"}</div>
        <label style={labelStyle}>이름</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="교사 이름" style={{...inputStyle,marginBottom:12}}/>
        <label style={labelStyle}>로그인 아이디 (영문/숫자)</label>
        <input value={loginId} onChange={e=>setLoginId(e.target.value)} placeholder="예: teacher3" style={{...inputStyle,marginBottom:12}}/>
        <label style={labelStyle}>역할</label>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          {[["false","담임교사"],["true","부장교사(전체)"]].map(([v,l])=>(
            <button key={v} onClick={()=>setIsHead(v==="true")} style={{flex:1,padding:"9px 0",borderRadius:7,fontWeight:700,fontSize:13,cursor:"pointer",background:(isHead===(v==="true"))?C.gold:C.surface,color:(isHead===(v==="true"))?"#1A1200":C.textMid,border:`1px solid ${(isHead===(v==="true"))?C.gold:C.border}`}}>{l}</button>
          ))}
        </div>
        {!isHead && (
          <React.Fragment>
            <label style={labelStyle}>담당 분반 (직접 입력)</label>
            <input value={klass} onChange={e=>setKlass(e.target.value)} placeholder="예: 사랑반" style={{...inputStyle,marginBottom:12}}/>
          </React.Fragment>
        )}
        <label style={labelStyle}>비밀번호</label>
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="숫자 4자리 권장" style={{...inputStyle,marginBottom:16}}/>
        
        <div style={{display:"flex",gap:8}}>
          <button onClick={submit} disabled={!name||!loginId||!password||(!isHead&&!klass)} style={{flex:1,padding:"11px 0",background:done?C.green:`linear-gradient(135deg, ${editingId?C.blue:C.gold}, ${editingId?"#4A90D9":"#F0D060"})`,color:done?"#fff":(editingId?"#fff":"#1A1200"),fontWeight:800,fontSize:14,border:"none",borderRadius:8,cursor:"pointer"}}>{done?"✓ 완료!":(editingId?"수정 저장":"교사 등록")}</button>
          {editingId && <button onClick={cancelEdit} style={{padding:"11px 18px",background:C.surface,color:C.textMid,fontSize:13,border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer"}}>취소</button>}
        </div>
      </div>
    </div>
  );
}

function ParentManage({ parents, students, onAdd, onUpdate, onRemove }){
  const [editingId, setEditingId] = useState(null);
  const [name,setName]=useState("");
  const [loginId,setLoginId]=useState("");
  const [childId,setChildId]=useState("");
  const [password,setPassword]=useState("");
  const [done,setDone]=useState(false);
  const childName=(id)=>students.find(s=>s.id===id)?.name||"미지정";
  
  const startEdit = (p) => {
      setEditingId(p.id); setName(p.name); setLoginId(p.login_id); setChildId(p.child_id); setPassword(p.password);
  };
  const cancelEdit = () => {
      setEditingId(null); setName(""); setLoginId(""); setChildId(""); setPassword("");
  };

  const submit=async()=>{
    if(!name||!loginId||!password||!childId) return;
    if(editingId) {
        await onUpdate(editingId, { name, login_id:loginId, child_id:childId, password });
    } else {
        await onAdd({ name, login_id:loginId, child_id:childId, password });
    }
    cancelEdit(); setDone(true);setTimeout(()=>setDone(false),2000);
  };

  return (
    <div>
      <div style={{fontWeight:700,color:C.textMid,fontSize:13,marginBottom:10}}>전체 학부모 ({parents.length}명)</div>
      {parents.map(p=>(
        <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:C.card,border:`1px solid ${editingId===p.id?C.blue:C.border}`,borderRadius:9,marginBottom:7}}>
          <div><span style={{fontWeight:700}}>{p.name}</span><span style={{fontSize:11,color:C.purple,marginLeft:8,fontWeight:700}}>👨‍👩‍👧 자녀: {childName(p.child_id)}</span></div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11,color:C.textDim}}>ID: {p.login_id}</span>
            <button onClick={()=>startEdit(p)} style={{background:C.surface,color:C.blue,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>수정</button>
            <button onClick={()=>{ if(window.confirm(`정말 '${p.name}' 계정을 삭제하시겠습니까?`)) onRemove(p.id); }} style={{background:C.redBg,color:C.red,border:`1px solid ${C.red}`,borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>삭제</button>
          </div>
        </div>
      ))}
      <div style={{background:C.card,border:`1px solid ${editingId?C.blue:C.border}`,borderRadius:12,padding:16,marginTop:16}}>
        <div style={{fontWeight:700,color:editingId?C.blue:C.gold,marginBottom:14}}>{editingId ? "✏️ 학부모 정보 수정" : "➕ 학부모 추가"}</div>
        <label style={labelStyle}>이름</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="예: 홍길동 부모님" style={{...inputStyle,marginBottom:12}}/>
        <label style={labelStyle}>로그인 아이디 (영문/숫자)</label>
        <input value={loginId} onChange={e=>setLoginId(e.target.value)} placeholder="예: parent2" style={{...inputStyle,marginBottom:12}}/>
        <label style={labelStyle}>연결할 자녀 (학생)</label>
        <select value={childId} onChange={e=>setChildId(e.target.value)} style={{...inputStyle,marginBottom:12}}>
          <option value="">-- 자녀 선택 --</option>
          {students.map(s=><option key={s.id} value={s.id}>{s.name} ({s.grade} · {s.klass})</option>)}
        </select>
        <label style={labelStyle}>비밀번호</label>
        <input value={password} onChange={e=>setPassword(e.target.value)} placeholder="숫자 4자리 권장" style={{...inputStyle,marginBottom:16}}/>
        
        <div style={{display:"flex",gap:8}}>
          <button onClick={submit} disabled={!name||!loginId||!password||!childId} style={{flex:1,padding:"11px 0",background:done?C.green:`linear-gradient(135deg, ${editingId?C.blue:C.gold}, ${editingId?"#4A90D9":"#F0D060"})`,color:done?"#fff":(editingId?"#fff":"#1A1200"),fontWeight:800,fontSize:14,border:"none",borderRadius:8,cursor:"pointer"}}>{done?"✓ 완료!":(editingId?"수정 저장":"학부모 등록")}</button>
          {editingId && <button onClick={cancelEdit} style={{padding:"11px 18px",background:C.surface,color:C.textMid,fontSize:13,border:`1px solid ${C.border}`,borderRadius:8,cursor:"pointer"}}>취소</button>}
        </div>
      </div>
    </div>
  );
}

function TopBar({ title, subtitle, right, logout, onOpenPwModal }){

    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 20px",borderBottom:`1px solid ${C.border}`}}>
      <div><div style={{fontSize:11,color:C.textDim}}>{subtitle}</div><div style={{fontWeight:800,color:C.gold,fontSize:16}}>{title}</div></div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {right && <span style={{fontSize:12,color:C.textMid}}>{right}</span>}
        <button onClick={onOpenPwModal} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.textMid,padding:"6px 10px",borderRadius:6,fontSize:11,cursor:"pointer"}}>정보수정</button>
        <button onClick={logout} style={{background:C.surface,border:`1px solid ${C.border}`,color:C.textMid,padding:"6px 10px",borderRadius:6,fontSize:11,cursor:"pointer"}}>로그아웃</button>
      </div>
    </div>

}
function TabBtn({ active, onClick, children }){
  return <button onClick={onClick} style={{padding:"7px 14px",borderRadius:20,fontWeight:700,fontSize:13,cursor:"pointer",background:active?C.gold:C.surface,color:active?"#1A1200":C.textMid,border:`1px solid ${active?C.gold:C.border}`}}>{children}</button>;
}
function StatCard({ label, value, color }){
  return <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px"}}><div style={{fontSize:11,color:C.textDim,marginBottom:4}}>{label}</div><div style={{fontSize:22,fontWeight:900,color:color||C.gold}}>{value}</div></div>;
}
